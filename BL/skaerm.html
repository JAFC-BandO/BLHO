<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Butik Skærm</title>
<script>
  // Dynamisk manifest, saa "Foej til startskaerm" (Android/Chrome) installerer en
  // fuldskaerms-genvej uden adresselinje/browser-UI. Et almindeligt statisk manifest.json
  // kunne ikke bruges her, fordi alle butikker deler denne samme fil -- start_url skal
  // vaere netop DENNE butiks fulde URL inkl. ?email=&password=, ellers ville genvejen
  // logge ind som en forkert/ingen butik. Bygges derfor dynamisk ud fra location.href.
  (function () {
    const ikonUrl = new URL('favicon.svg?v=2', location.href).href;
    const manifest = {
      name: 'Butik Skærm',
      display: 'fullscreen',
      start_url: location.href,
      background_color: '#0a0a0a',
      theme_color: '#0a0a0a',
      // "any" (ikke en fast pixel-stoerrelse) er det korrekte "sizes"-hint for et SVG-ikon --
      // det er opløsnings-uafhaengigt. De fleste nyere Android/Chrome-launchere haandterer
      // SVG-manifest-ikoner fint, men er nogen enheder paa en aeldre/anderledes launcher der
      // viser et blankt hjemmeskaerm-ikon efter dette, er det den mest sandsynlige aarsag.
      icons: [{ src: ikonUrl, sizes: 'any', type: 'image/svg+xml' }],
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  })();
</script>
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- ?v= herunder skal bumpes hver gang render-shared.js/css aendres -- ellers kan disse to
     filer (som har deres egen GitHub Pages-cache) blive vaerende paa en aeldre udgave i op til
     10 minutter, selv efter man har aabnet siden med en frisk ?nocache= paa selve HTML'en. -->
<link rel="stylesheet" href="render-shared.css?v=2026-07-19-21">
<script src="render-shared.js?v=2026-07-19-21"></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #0a0a0a;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }
  /* .screen fylder altid hele den faktiske skaerm/vindue (ikke laast til 16:9) -- den skal
     tilpasse sig hvilken skaerm Pi'en rent faktisk saeder paa. container-type goer at
     cqw-enheder i render-shared.css er relative til DENNE boks' egen bredde i stedet for
     hele vinduets rod-viewport, saa nestede elementer (rotator, miljoeffekt) skalerer korrekt. */
  .screen {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #0a0a0a;
    container-type: inline-size;
    overflow: hidden;
  }

  /* Legacy fallback (ingen layout gemt endnu) */
  .legacy-wrap {
    width: 100%; height: 100%; display: flex; flex-direction: column;
    justify-content: center; align-items: center; text-align: center; padding: 6cqw;
  }
  .accent { width: 64px; height: 6px; background: #4d5bff; border-radius: 3px; margin-bottom: 3cqw; }
  .legacy-titel { font-size: 6cqw; font-weight: 700; line-height: 1.1; margin: 0 0 3cqw 0; }
  .legacy-tekst { font-size: 2.6cqw; line-height: 1.4; color: #d0d0d0; max-width: 70cqw; white-space: pre-wrap; }
  .legacy-billede { max-width: 60cqw; max-height: 40cqw; border-radius: 12px; margin-bottom: 4cqw; object-fit: cover; }

  .fejl { font-size: 1.6cqw; color: #888; text-align: center; padding: 4cqw; }
</style>
</head>
<body>
<div class="screen" id="screen">
  <div class="fejl">Indlæser...</div>
</div>

<!-- Vist naar siden besoeges UDEN ?email=&password= i URL'en -- dvs. en admin der selv
     aabner linket for at se sin egen butiks skaerm, i stedet for kiosk-enhedens automatiske
     login (som IKKE skal aendres, den skal blive ved at virke uaendret). Ingen kredentialer
     er bagt ind i selve linket her -- man logger ind med sin egen almindelige konto, og ser
     saa netop sin egen butik (samme RLS-opslag som resten af systemet). -->
<div id="loginOverlay" style="display:none; position:fixed; inset:0; background:#0a0a0a; align-items:center; justify-content:center; z-index:10;">
  <div style="width:min(320px, 90vw); text-align:center;">
    <div style="font-size:12px; color:#888; margin-bottom:18px; text-transform:uppercase; letter-spacing:.05em;">Se jeres skærm</div>
    <input type="email" id="skaermLoginEmail" placeholder="Email" autocomplete="username" style="width:100%; padding:11px 12px; margin-bottom:10px; border-radius:8px; border:1px solid #333; background:#1a1a1a; color:white; font-size:14px; box-sizing:border-box;">
    <input type="password" id="skaermLoginPassword" placeholder="Adgangskode" autocomplete="current-password" style="width:100%; padding:11px 12px; margin-bottom:14px; border-radius:8px; border:1px solid #333; background:#1a1a1a; color:white; font-size:14px; box-sizing:border-box;">
    <button id="skaermLoginBtn" style="width:100%; padding:12px; border-radius:8px; border:none; background:#040DB1; color:white; font-weight:600; font-size:14px; cursor:pointer;">Log ind</button>
    <div id="skaermLoginMsg" style="display:none; margin-top:12px; font-size:13px; color:#ff8080;"></div>
  </div>
</div>

<script>
  const SCRIPT_VERSION = '2026-07-19-master23';

  const SUPABASE_URL = 'https://irijatnmgvutrqngwpaa.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_taPyJFcINrPL5JiB-ay4CQ_iscnTyy3';
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { storageKey: 'sb-skaerm-auth' }
  });

  // ---------- Fejl-fangst (til Aktivitetslog) ----------
  // Samme mekanisme som butik-redigering.html: ubehandlede JS-fejl paa selve skaermen logges
  // via log_admin_handling (fire-and-forget, kraever kun at enheden er logget ind -- ikke
  // superadmin), saa vi kan se og fejlfinde et problem paa en butiks fysiske skaerm uden de
  // selv skal beskrive det. Loft + dedup per session forhindrer at en fejl der gentager sig i
  // et loop oversvoemmer loggen.
  const loggedeJsFejl = new Set();
  let jsFejlLogAntal = 0;
  const MAX_JS_FEJL_LOG_PR_SESSION = 20;
  // Rullende buffer af de seneste debugLog-linjer -- vedhaeftes en fejl-log naar den opstaar,
  // saa superadmin kan se hvad enheden REELT lavede lige foer, ikke kun selve fejllinjen. Uden
  // dette havde man kun ét citat uden kontekst at fejlfinde ud fra.
  const SENESTE_LOG_MAX_LINJER = 25;
  const senesteLogLinjer = [];
  function logAdminHandling(handling, detaljer) {
    client.rpc('log_admin_handling', { p_handling: handling, p_detaljer: detaljer || null })
      .then(({ error }) => { if (error) debugLog('[aktivitetslog] kunne ikke logge: ' + error.message); });
  }
  function logJsFejl(besked) {
    besked = (besked || 'Ukendt fejl').slice(0, 500);
    if (jsFejlLogAntal >= MAX_JS_FEJL_LOG_PR_SESSION || loggedeJsFejl.has(besked)) return;
    loggedeJsFejl.add(besked);
    jsFejlLogAntal++;
    const kontekst = senesteLogLinjer.length
      ? '\n\n--- Seneste log foer fejlen ---\n' + senesteLogLinjer.join('\n')
      : '';
    logAdminHandling('js_fejl', (besked + kontekst).slice(0, 4000));
  }
  // Let, sjaelden "status"-log (ikke hver eneste debugLog-linje -- det ville drukne
  // Aktivitetslog i stoej) -- saa superadmin kan se om en butiks skaerm reelt er i live og
  // fungerer normalt, ikke kun naar noget gaar galt.
  const STATUS_LOG_MS = 5 * 60 * 1000;
  function logStatus() {
    logAdminHandling('status', 'Kører normalt. ' + (senesteLogLinjer[senesteLogLinjer.length - 1] || ''));
  }
  window.addEventListener('error', (e) => {
    logJsFejl((e.message || 'Ukendt fejl') + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?'));
  });
  window.addEventListener('unhandledrejection', (e) => {
    const grund = e.reason && e.reason.message ? e.reason.message : String(e.reason);
    logJsFejl('Unhandled promise: ' + grund);
  });

  // 30s i stedet for tidligere 10s: en aendring skal jo bare vises inden for et minuts tid,
  // ikke oejeblikkeligt -- og hver poll er et Supabase-kald i den SAMME Chrome-proces der
  // ogsaa tegner skaermen, saa sjaeldnere kald letter reelt presset paa svag Android-hardware.
  const POLL_MS = 30000;
  const screen = document.getElementById('screen');
  const params = new URLSearchParams(location.search);
  const email = params.get('email');
  const password = params.get('password');
  // Sat af "Aabn jeres rigtige skaerm"-linket i butik-redigering, for at vise DEN butik man
  // faktisk kigger paa der, ikke noedvendigvis den logget-ind konto (fx en superadmin) selv
  // hoerer til -- se tilladelses-tjekket i findButik().
  const onsketButikId = params.get('butik_id');

  let butikId = null;
  let sidstOpdateret = null;
  let rotatorIntervals = [];
  let masterOpdateretAt = null;
  let masterElements = [];
  let harVistFoersteIndlaesning = false;

  // Bruges baade af den faste 10-minutters auto-genindlaesning og af aendrings-detektionen
  // i hentContent() -- en tilfoejet ?_cb= sikrer en rigtig frisk navigation, ikke bare et
  // cache-hit paa selve HTML-siden.
  function hardReload() {
    const url = new URL(location.href);
    url.searchParams.set('_cb', Date.now());
    location.href = url.toString();
  }

  function debugLog(msg) {
    const tidsstempel = new Date().toLocaleTimeString('da-DK');
    console.log('[skaerm-debug]', tidsstempel, msg);
    senesteLogLinjer.push(tidsstempel + ' ' + msg);
    if (senesteLogLinjer.length > SENESTE_LOG_MAX_LINJER) senesteLogLinjer.shift();
  }
  debugLog('Script version: ' + SCRIPT_VERSION);

  function visFejl(tekst) {
    screen.innerHTML = '<div class="fejl">' + tekst + '</div>';
  }

  function visLayout(elements, background) {
    rotatorIntervals.forEach(id => clearInterval(id));
    rotatorIntervals = [];
    screen.innerHTML = '';
    screen.style.background = background || '#0a0a0a';
    elements.forEach(el => screen.appendChild(buildElNode(el, id => rotatorIntervals.push(id))));
  }

  function visLegacy(content) {
    let html = '<div class="legacy-wrap"><div class="accent"></div>';
    if (content.billede_url) {
      html += '<img class="legacy-billede" src="' + content.billede_url + '">';
    }
    html += '<div class="legacy-titel">' + (content.titel || '') + '</div>';
    html += '<div class="legacy-tekst">' + (content.tekst || '') + '</div></div>';
    screen.innerHTML = html;
  }

  async function login() {
    debugLog('Logger ind som ' + email + '...');
    const { error } = await client.auth.signInWithPassword({ email, password });
    if (error) {
      debugLog('Login FEJLEDE: ' + error.message);
      visFejl('Login fejlede: ' + error.message);
      return false;
    }
    debugLog('Login OK');
    return true;
  }

  async function findButik() {
    const { data: { user } } = await client.auth.getUser();
    debugLog('auth.getUser() -> ' + (user ? user.id : 'INTET (ikke logget ind?)'));
    const { data, error } = await client
      .from('brugere')
      .select('butik_id, er_superadmin, butikker(navn)')
      .eq('id', user.id)
      .single();

    if (error || !data) {
      debugLog('brugere-opslag fejlede: ' + (error ? error.message : 'ingen raekke'));
      visFejl('Denne konto er ikke koblet til en butik.');
      return false;
    }

    // ?butik_id= (se onsketButikId ovenfor) bruges KUN hvis det rent faktisk er ens egen
    // butik, eller man er superadmin (samme rettighed som "skift butik" i redigeringssiden)
    // -- ellers ignoreres det stille, og man ser sin egen butik som normalt. Forhindrer en
    // almindelig admin i at se en ANDEN butiks skaerm bare ved at aendre tallet i URL'en.
    if (onsketButikId && (onsketButikId === data.butik_id || data.er_superadmin)) {
      butikId = onsketButikId;
      if (onsketButikId === data.butik_id) {
        saetAktuelButikNavn(data.butikker ? data.butikker.navn : '');
      } else {
        const { data: andenButik } = await client.from('butikker').select('navn').eq('id', onsketButikId).maybeSingle();
        saetAktuelButikNavn(andenButik ? andenButik.navn : '');
      }
    } else {
      butikId = data.butik_id;
      saetAktuelButikNavn(data.butikker ? data.butikker.navn : '');
    }
    debugLog('butik_id fundet: ' + butikId + ' | butik-navn (til {{butik}}-tag): ' + hentAktuelButikNavn());
    return true;
  }

  async function hentMasterSkabelon() {
    const { data, error } = await client
      .from('sabloner')
      .select('data, opdateret_at')
      .eq('standard', true)
      .eq('type', 'side')
      .maybeSingle();
    if (error) {
      debugLog('Kunne ikke hente faelles skabelon: ' + error.message);
      return;
    }
    masterOpdateretAt = data ? data.opdateret_at : null;
    masterElements = (data && data.data && data.data.elements) || [];
  }

  async function hentContent() {
    await hentMasterSkabelon();

    const { data, error } = await client
      .from('content')
      .select('*')
      .eq('butik_id', butikId)
      .order('opdateret_at', { ascending: false })
      .limit(1)
      .maybeSingle();

    if (error) {
      debugLog('FEJL ved hentning af content: ' + error.message);
      return;
    }

    if (!data) {
      debugLog('Ingen content-raekke fundet for butik_id ' + butikId);
      visFejl('Intet content endnu for denne butik.');
      return;
    }

    const combinedKey = data.opdateret_at + '|' + (masterOpdateretAt || '');
    if (combinedKey === sidstOpdateret) {
      debugLog('Uaendret (opdateret_at=' + combinedKey + ') - springer over');
      return;
    }
    debugLog('NY data fundet: ' + sidstOpdateret + ' -> ' + combinedKey);
    sidstOpdateret = combinedKey;

    // Foerste hentning (lige efter login) skal bare tegne op paa staedet. Enhver AENDRING
    // opdaget derefter (butikkens egen "Gem" i redigeringen, eller den faelles skabelon
    // aendret) betyder at nogen har trykket Gem -- saa genindlaes hele siden i stedet for
    // kun at gentegne, saa alt (kode, cache, layout) er 100% frisk.
    if (harVistFoersteIndlaesning) {
      debugLog('Aendring opdaget efter foerste indlaesning -- genindlaeser hele siden.');
      hardReload();
      return;
    }
    harVistFoersteIndlaesning = true;

    try {
      if (data.layout && Array.isArray(data.layout.elements) && data.layout.elements.length) {
        const sider = Array.isArray(data.layout.sider) ? data.layout.sider : [];
        const aktivSide = sider.find(s => s.id === data.layout.aktivSideId);
        debugLog('Gemte sider i DB: ' + sider.map(s => s.navn + ': ' + s.elements.map(e => e.type).join(',')).join(' | '));
        debugLog('Top-niveau elements (det der reelt vises): ' + data.layout.elements.map(e => e.type).join(','));
        const merged = mergeMasterElements(data.layout.elements, masterElements, aktivSide ? aktivSide.navn : null);
        debugLog('Tegner layout med ' + merged.length + ' elementer (inkl. faelles skabelon)');
        visLayout(merged, data.layout.background);
      } else {
        debugLog('Tegner legacy-visning (intet layout gemt)');
        visLegacy(data);
      }
      debugLog('Tegning faerdig.');
    } catch (renderErr) {
      debugLog('CRASH under tegning: ' + renderErr.message);
      logJsFejl('Tegne-crash: ' + renderErr.message);
    }
  }

  const RELOAD_MS = 10 * 60 * 1000; // genindlæs siden hvert 10. minut for altid at hente frisk kode
  function scheduleAutoReload() {
    setTimeout(hardReload, RELOAD_MS);
  }

  // Fælles for begge login-veje (kiosk-enhedens URL-parametre OG en admins egen interaktive
  // login herunder) -- alt der skal ske EFTER man er logget ind, uanset hvordan det skete.
  async function fortsaetEfterLogin() {
    const ok = await findButik();
    if (!ok) return;

    await hentContent();
    debugLog('Starter polling hvert ' + (POLL_MS / 1000) + 's');
    setInterval(() => {
      debugLog('Poll...');
      hentContent();
    }, POLL_MS);

    logStatus();
    setInterval(logStatus, STATUS_LOG_MS);
  }

  async function start() {
    scheduleAutoReload();

    if (email && password) {
      // Kiosk-enhedens egen, uaendrede flow: login via URL-parametre bagt ind i genvejen.
      const loggedIn = await login();
      if (!loggedIn) return;
      await fortsaetEfterLogin();
      return;
    }

    // Ingen URL-parametre: en admin besoeger selv linket for at se sin egen skaerm. Genbrug
    // en evt. allerede gemt session foerst (saa de ikke skal logge ind hver eneste gang de
    // aabner linket), ellers vis login-formen.
    const { data: { session } } = await client.auth.getSession();
    if (session) {
      debugLog('Genbruger eksisterende session.');
      await fortsaetEfterLogin();
    } else {
      document.getElementById('loginOverlay').style.display = 'flex';
    }
  }

  async function forsoegInteraktivLogin() {
    const e = document.getElementById('skaermLoginEmail').value.trim();
    const p = document.getElementById('skaermLoginPassword').value;
    const msgEl = document.getElementById('skaermLoginMsg');
    msgEl.style.display = 'none';
    if (!e || !p) {
      msgEl.textContent = 'Udfyld både email og adgangskode.';
      msgEl.style.display = 'block';
      return;
    }
    const btn = document.getElementById('skaermLoginBtn');
    btn.disabled = true;
    const { error } = await client.auth.signInWithPassword({ email: e, password: p });
    btn.disabled = false;
    if (error) {
      msgEl.textContent = 'Forkert email eller adgangskode.';
      msgEl.style.display = 'block';
      return;
    }
    document.getElementById('loginOverlay').style.display = 'none';
    await fortsaetEfterLogin();
  }
  document.getElementById('skaermLoginBtn').addEventListener('click', forsoegInteraktivLogin);
  ['skaermLoginEmail', 'skaermLoginPassword'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') forsoegInteraktivLogin();
    });
  });

  // Frame-vagthund: i stedet for at gaette videre paa AARSAGEN til at skaermen "hakker"/kører
  // langsomt efter noget tids drift (hukommelsespres, Chrome/Android-throttling, termisk
  // throttling af svag hardware -- kunne vaere hvad som helst), reagerer vi paa selve
  // SYMPTOMET: er tiden mellem to paa hinanden foelgende requestAnimationFrame-kald pludselig
  // meget stor, betyder det at browseren reelt er gaaet i staa/hakker kraftigt. Genindlaeser
  // proaktivt i stedet for at vente paa den faste 10-minutters cyklus eller haabe brugeren selv
  // opdager det og genstarter enheden manuelt.
  function startFrameWatchdog() {
    let sidsteFrameTid = performance.now();
    let langsommeFramesITraek = 0;

    // Browseren THROTTLER (i praksis stopper) requestAnimationFrame af sig selv naar siden
    // ikke er synlig (skaermen gaar i sleep/dæmpes af Android, et system-dialogvindue stjæler
    // fokus et øjeblik, osv.) -- det er FORVENTET, korrekt adfærd, ikke et hak/hæng. Uden
    // dette tjek fortolkede vagthunden den normale pause som en fastfrosset side og
    // genindlæste igen og igen, hver gang skærmen kom tilbage -- en falsk alarm-loop der intet
    // havde med en reel fejl at gøre (bekræftet: ingen anden JS-fejl fulgte med i loggen).
    function skaermErSynlig() {
      return document.visibilityState !== 'hidden';
    }
    document.addEventListener('visibilitychange', () => {
      if (skaermErSynlig()) sidsteFrameTid = performance.now();
    });

    function frameTick(nu) {
      const delta = nu - sidsteFrameTid;
      sidsteFrameTid = nu;
      // Et normalt frame er typisk 16-33ms (60/30Hz) -- over 500ms betyder reelt at siden
      // stod stille i et halvt sekund eller mere, hvilket aldrig skal ske under normal drift.
      if (delta > 500 && skaermErSynlig()) {
        langsommeFramesITraek++;
        if (langsommeFramesITraek >= 3) {
          debugLog('Frame-vagthund: browseren hakker (frame-delta ' + Math.round(delta) + 'ms, ' + langsommeFramesITraek + ' gange i traek) -- genindlaeser for en frisk session.');
          logJsFejl('Frame-vagthund: browseren hakkede (frame-delta ' + Math.round(delta) + 'ms) -- genindlæste.');
          // Kort forsinkelse foer selve genindlaesningen: logJsFejl's netvaerkskald er fire-
          // and-forget og naar ellers ikke at naa frem, fordi navigationen (location.href
          // herunder) kan afbryde et igangvaerende kald -- og det er netop DENNE logliniens
          // hele formaal at overleve, saa vi rent faktisk kan se fejlen bagefter.
          setTimeout(hardReload, 400);
          return;
        }
      } else {
        langsommeFramesITraek = 0;
      }
      requestAnimationFrame(frameTick);
    }
    requestAnimationFrame(frameTick);

    // Sikkerhedsnet: hvis requestAnimationFrame selv holder helt op med at fyre (en haardere
    // throttling-tilstand end blot langsomme frames), fanger frameTick det aldrig af sig selv
    // -- tjek derfor ogsaa periodisk via en helt separat timer-mekanisme.
    setInterval(() => {
      if (performance.now() - sidsteFrameTid > 5000 && skaermErSynlig()) {
        debugLog('Frame-vagthund: intet frame modtaget i over 5 sekunder -- genindlaeser.');
        logJsFejl('Frame-vagthund: intet frame i over 5 sekunder -- genindlæste.');
        setTimeout(hardReload, 400);
      }
    }, 5000);
  }
  startFrameWatchdog();

  start();
</script>
</body>
</html>
