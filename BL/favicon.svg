  <g fill="#00d8f6">
    <circle cx="210" cy="190" r="16"/>
    <circle cx="150" cy="240" r="18"/>
    <circle cx="110" cy="310" r="20"/>
    <circle cx="190" cy="330" r="16"/>
    <circle cx="256" cy="300" r="18"/>
    <circle cx="302" cy="190" r="16"/>
    <circle cx="362" cy="240" r="18"/>
    <circle cx="402" cy="310" r="20"/>
    <circle cx="322" cy="330" r="16"/>
  </g>
  
  <!-- Hvide lysglimt i noderne -->
  <g fill="#ffffff">
    <circle cx="150" cy="240" r="6"/>
    <circle cx="256" cy="300" r="6"/>
    <circle cx="362" cy="240" r="6"/>
    <circle cx="110" cy="310" r="7"/>
    <circle cx="402" cy="310" r="7"/>
