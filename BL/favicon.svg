<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Rund sort baggrund -->
  <circle cx="256" cy="256" r="250" fill="#000000"/>
  
  <!-- Professionel ydre cyan-ring -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="#00d8f6" stroke-width="10"/>

  <!-- Organiske/Neural baggrundsdetaljer inde i kolben -->
