<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Background -->
    <radialGradient id="bgGrad2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0E1626"/>
      <stop offset="65%" stop-color="#060A12"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>

    <!-- Cyan Gradient -->
    <linearGradient id="cyanGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="50%" stop-color="#00A8FF"/>
      <stop offset="100%" stop-color="#0055FF"/>
    </linearGradient>

    <!-- Core Glow -->
    <filter id="coreGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" rx="90" fill="url(#bgGrad2)"/>

  <!-- Outer Ring -->
  <circle cx="400" cy="400" r="350" fill="none" stroke="#1E293B" stroke-width="2"/>
  <circle cx="400" cy="400" r="350" fill="none" stroke="#00F0FF" stroke-width="2" stroke-dasharray="100 30 30 30" opacity="0.3"/>

  <!-- Hexagon Symbol -->
  <g transform="translate(400, 285)">
    <path d="M 0 -150 L 130 -75 L 130 75 L 0 150 L -130 75 L -130 -75 Z" 
          fill="none" 
          stroke="url(#cyanGrad2)" 
          stroke-width="14" 
          stroke-linejoin="round" 
          stroke-linecap="round"/>
    
    <path d="M 0 -150 L 0 0 L 130 75" fill="none" stroke="url(#cyanGrad2)" stroke-width="10" stroke-linecap="round"/>
    <path d="M -130 -75 L 0 0 L -130 75" fill="none" stroke="url(#cyanGrad2)" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Central Glowing Core -->
    <circle cx="0" cy="0" r="11" fill="#00F0FF" filter="url(#coreGlow)"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.85"/>
  </g>

  <!-- Typography -->
  <text x="400" y="555" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" letter-spacing="12" text-anchor="middle">JFC LABS</text>
  <text x="400" y="600" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="14" fill="#00F0FF" letter-spacing="7" opacity="0.85" text-anchor="middle">INNOVATION &amp; TECH</text>
</svg>
