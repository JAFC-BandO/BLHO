    <line x1="210" y1="190" x2="302" y2="190"/>
    <line x1="190" y1="330" x2="256" y2="300"/>
    <line x1="256" y1="300" x2="322" y2="330"/>
    
    <line x1="302" y1="190" x2="362" y2="240"/>
    <line x1="362" y1="240" x2="402" y2="310"/>
    <line x1="402" y1="310" x2="322" y2="330"/>
    <line x1="322" y1="330" x2="302" y2="180"/>
    <line x1="362" y1="240" x2="322" y2="330"/>
  </g>

  <!-- Professionel Laboratoriekolbe Kontur -->
  <path d="M 216 100 L 296 100 
           M 236 100 L 236 175 L 148 335 C 135 360, 155 370, 180 370 L 332 370 C 357 370, 377 360, 364 335 L 276 175 L 276 100" 
        fill="none" stroke="#00d8f6" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>

