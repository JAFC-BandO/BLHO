<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vælg dit password</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f4f4f2;
    margin: 0;
    padding: 0;
    color: #1a1a1a;
  }
  .wrap {
    max-width: 420px;
    margin: 0 auto;
    padding: 32px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 12px;
    padding: 32px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  h1 { font-size: 20px; margin: 0 0 4px 0; color: #040DB1; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; margin-top: 16px; color: #333; }
  input[type=password] {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; font-family: inherit;
  }
  button {
    width: 100%; padding: 12px; border: none; border-radius: 8px; background: #040DB1;
    color: white; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 20px;
  }
  button:hover { background: #0311d4; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .msg { margin-top: 14px; font-size: 14px; padding: 10px 12px; border-radius: 8px; display: none; }
  .msg.ok { background: #e6f4ea; color: #1e7e34; display: block; }
  .msg.err { background: #fdecea; color: #b92a15; display: block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Vælg dit password</h1>
    <div class="subtitle">Sæt et password for at få adgang til redigeringssiden</div>
    <label for="password">Nyt password</label>
    <input type="password" id="password" autocomplete="new-password">
    <label for="password2">Gentag password</label>
    <input type="password" id="password2" autocomplete="new-password">
    <button id="setBtn">Gem password</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://irijatnmgvutrqngwpaa.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_taPyJFcINrPL5JiB-ay4CQ_iscnTyy3';
  // Samme storageKey som butik-redigering.html, saa man er logget ind der bagefter.
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { storageKey: 'sb-butik-redigering-auth' }
  });

  const msgEl = document.getElementById('msg');
  function showMsg(text, ok) {
    msgEl.textContent = text;
    msgEl.className = 'msg ' + (ok ? 'ok' : 'err');
  }

  document.getElementById('setBtn').addEventListener('click', async () => {
    const p1 = document.getElementById('password').value;
    const p2 = document.getElementById('password2').value;

    if (p1.length < 8) {
      showMsg('Password skal være mindst 8 tegn.', false);
      return;
    }
    if (p1 !== p2) {
      showMsg('Passwordene er ikke ens.', false);
      return;
    }

    const btn = document.getElementById('setBtn');
    btn.disabled = true;

    const { data: { session } } = await client.auth.getSession();
    if (!session) {
      showMsg('Linket er ugyldigt eller udløbet. Bed om en ny invitation.', false);
      btn.disabled = false;
      return;
    }

    const { error } = await client.auth.updateUser({ password: p1 });
    btn.disabled = false;

    if (error) {
      showMsg('Kunne ikke gemme password: ' + error.message, false);
      return;
    }

    showMsg('Password gemt! Du sendes videre om lidt...', true);
    setTimeout(() => { location.href = 'butik-redigering.html'; }, 2000);
  });
</script>
</body>
</html>
