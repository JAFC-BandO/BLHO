<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Butik Skærm</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* .screen laases til 16:9 og "letterboxes" (sorte bjaelker) hvis det faktiske vindue/
     skaerm ikke er praecis 16:9 -- ellers ville designet se forskudt/strakt ud i forhold
     til redigeringssidens canvas, som altid er 16:9. container-type goer at cqw-enheder
     herunder er relative til DENNE boks' bredde, ikke hele vinduet, saa alt skalerer
     korrekt uanset letterboxing. */
  .screen {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 177.78vh;
    max-height: 56.25vw;
    background: #0a0a0a;
    container-type: inline-size;
    overflow: hidden;
  }
  .el {
    position: absolute;
    overflow: hidden;
  }
  .el-text {
    width: 100%;
    height: 100%;
    padding: 1cqw;
    white-space: pre-wrap;
    line-height: 1.3;
  }
  .el[data-type="titel"] .el-text { font-size: 3.2cqw; font-weight: 700; }
  .el[data-type="tekst"] .el-text { font-size: 1.8cqw; color: #d0d0d0; }
  .el-media { width: 100%; height: 100%; object-fit: cover; display: block; }
  .miljoeffekt-card {
    width: 100%; height: 100%; background: #fff; color: #000; box-sizing: border-box;
    border: 5px solid #f23297; border-radius: 16px; overflow-y: auto;
  }
  .miljoeffekt-box1, .miljoeffekt-box2 { border-bottom: 1px solid #f23297; padding: 6% 8%; text-align: center; }
  .miljoeffekt-box3 { padding: 6% 8%; text-align: center; }
  .miljoeffekt-h4 { font-weight: 900; margin: 0 0 3% 0; font-size: 2.2cqw; }
  .miljoeffekt-desc { line-height: 1.4; margin: 0; font-size: 1.1cqw; }
  .miljoeffekt-amount { font-weight: 800; margin: 2% 0; font-size: 1.6cqw; }
  .miljoeffekt-label { margin: 1% 0; font-size: 1.1cqw; }
  .miljoeffekt-linkbox { text-align: center; padding: 4% 0 6% 0; }
  .miljoeffekt-btn {
    display: inline-block; background: #f23297; color: #fff; font-weight: 800;
    padding: 2% 6%; border-radius: 10px; text-decoration: none; font-size: 1.1cqw;
  }

  /* Legacy fallback (ingen layout gemt endnu) */
  .legacy-wrap {
    width: 100%; height: 100%; display: flex; flex-direction: column;
    justify-content: center; align-items: center; text-align: center; padding: 6cqw;
  }
  .accent { width: 64px; height: 6px; background: #4d5bff; border-radius: 3px; margin-bottom: 3cqw; }
  .legacy-titel { font-size: 6cqw; font-weight: 700; line-height: 1.1; margin: 0 0 3cqw 0; }
  .legacy-tekst { font-size: 2.6cqw; line-height: 1.4; color: #d0d0d0; max-width: 70cqw; white-space: pre-wrap; }
  .legacy-billede { max-width: 60cqw; max-height: 40cqw; border-radius: 12px; margin-bottom: 4cqw; object-fit: cover; }

  .fejl { font-size: 1.6cqw; color: #888; text-align: center; padding: 4cqw; }
</style>
</head>
<body>
<div class="screen" id="screen">
  <div class="fejl">Indlæser...</div>
</div>

<script>
  const SCRIPT_VERSION = '2026-07-16-debug1';

  const SUPABASE_URL = 'https://irijatnmgvutrqngwpaa.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_taPyJFcINrPL5JiB-ay4CQ_iscnTyy3';
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { storageKey: 'sb-skaerm-auth' }
  });

  const POLL_MS = 10000;
  const screen = document.getElementById('screen');
  const params = new URLSearchParams(location.search);
  const email = params.get('email');
  const password = params.get('password');

  let butikId = null;
  let sidstOpdateret = null;

  function debugLog(msg) {
    console.log('[skaerm-debug]', new Date().toLocaleTimeString('da-DK'), msg);
  }
  debugLog('Script version: ' + SCRIPT_VERSION);

  function visFejl(tekst) {
    screen.innerHTML = '<div class="fejl">' + tekst + '</div>';
  }

  const MILJOEFFEKT_URL = 'https://www.boerneloppen.dk/boerneloppen-theme/world_goals/calculateConsumptionVariables.json';
  const MILJOEFFEKT_REFRESH_MS = 60000;

  function formatDanskTal(n) {
    return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  }

  async function fetchMiljoeffektData() {
    const res = await fetch(MILJOEFFEKT_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  function miljoeffektCardHtml(data) {
    return (
      '<div class="miljoeffekt-box1">' +
        '<div class="miljoeffekt-h4">DU HJÆLPER VERDEN</div>' +
        '<div class="miljoeffekt-desc">Når du køber brugt, gør du en KÆMPE forskel for miljøet.<br>' +
        'Hos Børneloppen er vi stolte!<br>Sammen har vi sparet verden for:</div>' +
      '</div>' +
      '<div class="miljoeffekt-box2">' +
        '<div class="miljoeffekt-amount">' + formatDanskTal(data.savedWaterConsumption) + ' liter vand</div>' +
        '<div class="miljoeffekt-label">Det er vand nok til</div>' +
        '<div class="miljoeffekt-amount">' + formatDanskTal(data.savedToiletFlushes) + ' toiletskyl</div>' +
      '</div>' +
      '<div class="miljoeffekt-box3">' +
        '<div class="miljoeffekt-amount">' + formatDanskTal(data.savedCo2Emissions) + ' kg CO<sub>2</sub></div>' +
        '<div class="miljoeffekt-label">Det er samme udledning som</div>' +
        '<div class="miljoeffekt-amount">' + formatDanskTal(data.savedKmInCar) + ' km i bil</div>' +
      '</div>' +
      '<div class="miljoeffekt-linkbox"><span class="miljoeffekt-btn">Læs mere om vores Verdensmål</span></div>'
    );
  }

  function stripInlineFontSize(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    tmp.querySelectorAll('[style]').forEach(node => {
      node.style.fontSize = '';
      if (!node.getAttribute('style').trim()) node.removeAttribute('style');
    });
    return tmp.innerHTML;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function youtubeEmbedUrl(url) {
    const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (!m) return url;
    const id = m[1];
    return 'https://www.youtube.com/embed/' + id + '?autoplay=1&mute=1&loop=1&controls=0&playlist=' + id;
  }

  let rotatorIntervals = [];

  function buildMediaNode(spec) {
    let media;
    if (spec.type === 'video' && spec.kind === 'youtube') {
      media = document.createElement('iframe');
      media.src = youtubeEmbedUrl(spec.url);
      media.setAttribute('frameborder', '0');
      media.setAttribute('allow', 'autoplay; encrypted-media');
    } else if (spec.type === 'billede') {
      media = document.createElement('img');
      media.src = spec.url;
      media.style.objectFit = 'contain';
    } else {
      media = document.createElement('video');
      media.src = spec.url;
      media.muted = true;
      media.autoplay = true;
      media.loop = true;
      media.playsInline = true;
    }
    media.className = 'el-media';
    return media;
  }

  // Bygger DOM-noden for ét element. Bruges baade paa topniveau og nestet inde i en
  // rotator's "side"-slides (hele gemte skabeloner som roterer sammen med billeder/videoer).
  function buildElNode(el) {
    const node = document.createElement('div');
    node.className = 'el';
    node.dataset.type = el.type;
    node.style.left = el.x + '%';
    node.style.top = el.y + '%';
    node.style.width = el.w + '%';
    node.style.height = el.h + '%';
    if (el.boxColor) node.style.background = el.boxColor;

    if (el.type === 'titel' || el.type === 'tekst') {
      const t = document.createElement('div');
      t.className = 'el-text';
      t.innerHTML = el.html != null ? stripInlineFontSize(el.html) : escapeHtml(el.text || '');
      if (el.fontSize) t.style.fontSize = el.fontSize + 'cqw';
      if (el.textColor) t.style.color = el.textColor;
      node.appendChild(t);
    } else if (el.type === 'billede' && el.url) {
      node.appendChild(buildMediaNode({ type: 'billede', url: el.url }));
    } else if (el.type === 'video' && el.url) {
      node.appendChild(buildMediaNode({ type: 'video', url: el.url, kind: el.kind }));
    } else if (el.type === 'rotator' && Array.isArray(el.slides) && el.slides.length) {
      let idx = 0;
      const showSlide = () => {
        node.innerHTML = '';
        const slide = el.slides[idx];
        if (slide.type === 'side') {
          const inner = document.createElement('div');
          inner.style.cssText = 'position:relative; width:100%; height:100%; overflow:hidden; container-type:inline-size;';
          if (slide.background) inner.style.background = slide.background;
          (slide.elements || []).forEach(subEl => inner.appendChild(buildElNode(subEl)));
          node.appendChild(inner);
        } else {
          node.appendChild(buildMediaNode(slide));
        }
        idx = (idx + 1) % el.slides.length;
      };
      showSlide();
      if (el.slides.length > 1) {
        rotatorIntervals.push(setInterval(showSlide, el.intervalMs || 5000));
      }
    } else if (el.type === 'miljoeffekt') {
      const card = document.createElement('div');
      card.className = 'miljoeffekt-card';
      node.appendChild(card);

      const load = () => {
        fetchMiljoeffektData()
          .then(data => { card.innerHTML = miljoeffektCardHtml(data); })
          .catch(() => { /* behold seneste kendte vaerdier ved fejl */ });
      };
      load();
      rotatorIntervals.push(setInterval(load, MILJOEFFEKT_REFRESH_MS));
    }
    return node;
  }

  function visLayout(elements, background) {
    rotatorIntervals.forEach(id => clearInterval(id));
    rotatorIntervals = [];
    screen.innerHTML = '';
    screen.style.background = background || '#0a0a0a';
    elements.forEach(el => screen.appendChild(buildElNode(el)));
  }

  function visLegacy(content) {
    let html = '<div class="legacy-wrap"><div class="accent"></div>';
    if (content.billede_url) {
      html += '<img class="legacy-billede" src="' + content.billede_url + '">';
    }
    html += '<div class="legacy-titel">' + (content.titel || '') + '</div>';
    html += '<div class="legacy-tekst">' + (content.tekst || '') + '</div></div>';
    screen.innerHTML = html;
  }

  async function login() {
    debugLog('Logger ind som ' + email + '...');
    const { error } = await client.auth.signInWithPassword({ email, password });
    if (error) {
      debugLog('Login FEJLEDE: ' + error.message);
      visFejl('Login fejlede: ' + error.message);
      return false;
    }
    debugLog('Login OK');
    return true;
  }

  async function findButik() {
    const { data: { user } } = await client.auth.getUser();
    debugLog('auth.getUser() -> ' + (user ? user.id : 'INTET (ikke logget ind?)'));
    const { data, error } = await client
      .from('brugere')
      .select('butik_id')
      .eq('id', user.id)
      .single();

    if (error || !data) {
      debugLog('brugere-opslag fejlede: ' + (error ? error.message : 'ingen raekke'));
      visFejl('Denne konto er ikke koblet til en butik.');
      return false;
    }
    butikId = data.butik_id;
    debugLog('butik_id fundet: ' + butikId);
    return true;
  }

  async function hentContent() {
    const { data, error } = await client
      .from('content')
      .select('*')
      .eq('butik_id', butikId)
      .order('opdateret_at', { ascending: false })
      .limit(1)
      .maybeSingle();

    if (error) {
      debugLog('FEJL ved hentning af content: ' + error.message);
      return;
    }

    if (!data) {
      debugLog('Ingen content-raekke fundet for butik_id ' + butikId);
      visFejl('Intet content endnu for denne butik.');
      return;
    }

    if (data.opdateret_at === sidstOpdateret) {
      debugLog('Uaendret (opdateret_at=' + data.opdateret_at + ') - springer over');
      return;
    }
    debugLog('NY data fundet: ' + sidstOpdateret + ' -> ' + data.opdateret_at);
    sidstOpdateret = data.opdateret_at;

    try {
      if (data.layout && Array.isArray(data.layout.elements) && data.layout.elements.length) {
        debugLog('Tegner layout med ' + data.layout.elements.length + ' elementer');
        visLayout(data.layout.elements, data.layout.background);
      } else {
        debugLog('Tegner legacy-visning (intet layout gemt)');
        visLegacy(data);
      }
      debugLog('Tegning faerdig.');
    } catch (renderErr) {
      debugLog('CRASH under tegning: ' + renderErr.message);
    }
  }

  const RELOAD_MS = 10 * 60 * 1000; // genindlæs siden hvert 10. minut for altid at hente frisk kode
  function scheduleAutoReload() {
    setTimeout(() => {
      const url = new URL(location.href);
      url.searchParams.set('_cb', Date.now());
      location.href = url.toString();
    }, RELOAD_MS);
  }

  async function start() {
    scheduleAutoReload();

    if (!email || !password) {
      visFejl('Mangler ?email= og &password= i URL\'en.');
      return;
    }
    const loggedIn = await login();
    if (!loggedIn) return;

    const ok = await findButik();
    if (!ok) return;

    await hentContent();
    debugLog('Starter polling hvert ' + (POLL_MS / 1000) + 's');
    setInterval(() => {
      debugLog('Poll...');
      hentContent();
    }, POLL_MS);
  }

  start();
</script>
</body>
</html>
