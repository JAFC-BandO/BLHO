<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Butik Skærm</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #0a0a0a;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }
  .screen {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 6vw;
  }
  .accent {
    width: 64px;
    height: 6px;
    background: #4d5bff;
    border-radius: 3px;
    margin-bottom: 3vh;
  }
  .titel {
    font-size: 6vw;
    font-weight: 700;
    line-height: 1.1;
    margin: 0 0 3vh 0;
  }
  .tekst {
    font-size: 2.6vw;
    font-weight: 400;
    line-height: 1.4;
    color: #d0d0d0;
    max-width: 70vw;
    white-space: pre-wrap;
  }
  .billede {
    max-width: 60vw;
    max-height: 40vh;
    border-radius: 12px;
    margin-bottom: 4vh;
    object-fit: cover;
  }
  .fejl {
    font-size: 1.6vw;
    color: #888;
  }
</style>
</head>
<body>
<div class="screen" id="screen">
  <div class="fejl">Indlæser...</div>
</div>

<script>
  const SUPABASE_URL = 'https://irijatnmgvutrqngwpaa.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_taPyJFcINrPL5JiB-ay4CQ_iscnTyy3';
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const POLL_MS = 15000;
  const screen = document.getElementById('screen');
  const params = new URLSearchParams(location.search);
  const slug = params.get('butik');

  let butikId = null;
  let sidstOpdateret = null;

  function visFejl(tekst) {
    screen.innerHTML = '<div class="fejl">' + tekst + '</div>';
  }

  function visIndhold(content) {
    let html = '<div class="accent"></div>';
    if (content.billede_url) {
      html += '<img class="billede" src="' + content.billede_url + '">';
    }
    html += '<div class="titel">' + (content.titel || '') + '</div>';
    html += '<div class="tekst">' + (content.tekst || '') + '</div>';
    screen.innerHTML = html;
  }

  async function findButik() {
    const { data, error } = await client
      .from('butikker')
      .select('id, navn')
      .eq('slug', slug)
      .single();

    if (error || !data) {
      visFejl('Ukendt butik "' + slug + '". Tjek ?butik= i URL\'en.');
      return false;
    }
    butikId = data.id;
    return true;
  }

  async function hentContent() {
    const { data, error } = await client
      .from('content')
      .select('*')
      .eq('butik_id', butikId)
      .order('opdateret_at', { ascending: false })
      .limit(1)
      .maybeSingle();

    if (error) return;

    if (!data) {
      visFejl('Intet content endnu for denne butik.');
      return;
    }

    if (data.opdateret_at !== sidstOpdateret) {
      sidstOpdateret = data.opdateret_at;
      visIndhold(data);
    }
  }

  async function start() {
    if (!slug) {
      visFejl('Mangler ?butik=slug i URL\'en.');
      return;
    }
    const ok = await findButik();
    if (!ok) return;

    await hentContent();
    setInterval(hentContent, POLL_MS);
  }

  start();
</script>
</body>
</html>
