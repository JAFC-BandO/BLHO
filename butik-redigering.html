<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Butik Content - Redigering</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f4f4f2;
    margin: 0;
    padding: 0;
    color: #1a1a1a;
  }

  /* --- Login --- */
  .login-wrap {
    max-width: 420px;
    margin: 0 auto;
    padding: 32px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 12px;
    padding: 32px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  h1 { font-size: 20px; margin: 0 0 4px 0; color: #040DB1; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; margin-top: 16px; color: #333; }
  input[type=email], input[type=password], input[type=text] {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; font-family: inherit;
  }
  button { border: none; border-radius: 8px; background: #040DB1; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
  button:hover { background: #0311d4; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .primary-btn { width: 100%; padding: 12px; font-size: 15px; margin-top: 20px; }
  .msg { margin-top: 14px; font-size: 14px; padding: 10px 12px; border-radius: 8px; display: none; }
  .msg.ok { background: #e6f4ea; color: #1e7e34; display: block; }
  .msg.err { background: #fdecea; color: #b92a15; display: block; }

  /* --- App shell --- */
  #app { display: none; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; background: white; border-bottom: 1px solid #e2e2e2;
  }
  .butik-badge {
    display: inline-block; background: #eef0fd; color: #040DB1;
    padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .logout { font-size: 13px; color: #888; cursor: pointer; text-decoration: underline; }
  #saveBtn { padding: 8px 18px; }

  .main {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 16px;
    padding: 16px;
    align-items: start;
  }

  /* --- Sidebar --- */
  .sidebar { background: white; border-radius: 10px; padding: 14px; }
  .sidebar h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .03em; color: #888; margin: 0 0 10px 0; }
  .add-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .add-btn { padding: 10px 6px; font-size: 13px; background: #eef0fd; color: #040DB1; }
  .add-btn:hover { background: #dde1fb; }

  .media-banner { display: none; background: #fff4e5; color: #8a5a00; font-size: 12px; padding: 8px 10px; border-radius: 8px; margin-bottom: 10px; }
  .media-banner.active { display: block; }
  .media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .media-item {
    position: relative; border: 2px solid transparent; border-radius: 8px; overflow: hidden;
    cursor: pointer; background: #f0f0f0; aspect-ratio: 1 / 1;
  }
  .media-item.selectable { border-color: #4d5bff; }
  .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .media-item .fname { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,.55); color: white; font-size: 9px; padding: 2px 4px; }
  .upload-label {
    display: block; text-align: center; padding: 10px; margin-top: 10px; border: 1px dashed #bbb;
    border-radius: 8px; font-size: 13px; color: #555; cursor: pointer;
  }
  .upload-label:hover { border-color: #040DB1; color: #040DB1; }
  .upload-label input { display: none; }

  /* --- Canvas --- */
  .canvas-outer { background: white; border-radius: 10px; padding: 14px; }
  .canvas {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #0a0a0a;
    border-radius: 8px;
    overflow: hidden;
  }
  .el {
    position: absolute;
    border: 1px solid rgba(255,255,255,.25);
    background: rgba(255,255,255,.03);
    display: flex;
    flex-direction: column;
    min-width: 40px;
    min-height: 30px;
  }
  .el.selectable-target { outline: 2px solid #ffb300; }
  .el.selected { outline: 2px solid #4d5bff; }
  .el-header {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,0,0,.55); padding: 2px 4px; cursor: move; flex-shrink: 0;
  }
  .el-header .tag { color: #aaa; font-size: 9px; text-transform: uppercase; letter-spacing: .04em; }
  .el-header .del { color: #ff8080; cursor: pointer; font-size: 13px; line-height: 1; padding: 2px 4px; }
  .fmt-group { display: none; align-items: center; }
  .el.selected .fmt-group { display: flex; }
  .el-header .fmt-btn {
    background: rgba(255,255,255,.15); color: white; border: none; border-radius: 4px;
    font-size: 10px; padding: 1px 6px; cursor: pointer; line-height: 1.5; margin: 0 2px;
  }
  .el-header .fmt-btn:hover { background: rgba(255,255,255,.3); }
  .emoji-picker {
    position: absolute; z-index: 1000; background: white; border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.25); padding: 6px; display: grid;
    grid-template-columns: repeat(6, 1fr); gap: 2px; max-width: 220px;
  }
  .emoji-picker button { font-size: 16px; padding: 4px; border: none; background: none; cursor: pointer; border-radius: 4px; }
  .emoji-picker button:hover { background: #eee; }
  .el-body { flex: 1; overflow: hidden; position: relative; }
  .el-text {
    width: 100%; height: 100%; color: white; padding: 4px 6px; outline: none;
    font-size: 1.4vw; line-height: 1.3; overflow: auto; background: transparent;
  }
  .el[data-type="titel"] .el-text { font-size: 2.6vw; font-weight: 700; }
  .el-text ul, .el-text ol { margin: 0; padding-left: 1.2em; }
  .el-text li { margin: 2px 0; }
  .el-media-fill { width: 100%; height: 100%; object-fit: cover; display: block; }
  .el-placeholder {
    width: 100%; height: 100%; display: flex; flex-direction: column; gap: 6px;
    align-items: center; justify-content: center; color: #888; font-size: 11px; padding: 6px;
  }
  .el-placeholder button, .el-placeholder label {
    font-size: 10px; padding: 4px 8px; background: #2a2a2a; color: #ddd; border-radius: 6px; cursor: pointer;
  }
  .el-placeholder input[type="file"] { display: none; }
  .el-change-btn {
    position: absolute; top: 2px; right: 2px; font-size: 9px; padding: 2px 6px;
    background: rgba(0,0,0,.6); color: white; border-radius: 4px; cursor: pointer;
  }
  .resize-handle {
    position: absolute; right: 0; bottom: 0; width: 14px; height: 14px;
    cursor: nwse-resize; background: rgba(255,255,255,.35);
    border-top-left-radius: 4px;
  }

  .save-row { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
  #saveMsg.msg { margin-top: 0; }
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="card" id="loginCard">
    <h1>Log ind</h1>
    <div class="subtitle">Rediger content til din butiks skærm</div>
    <label for="email">Email</label>
    <input type="email" id="email" autocomplete="username">
    <label for="password">Adgangskode</label>
    <input type="password" id="password" autocomplete="current-password">
    <button class="primary-btn" id="loginBtn">Log ind</button>
    <div class="msg" id="loginMsg"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="butik-badge" id="butikNavn"></div>
    <div class="topbar-actions">
      <div class="msg" id="saveMsg" style="display:none;"></div>
      <button id="saveBtn">Gem ændringer</button>
      <div class="logout" id="logoutBtn">Log ud</div>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <h2>Tilføj element</h2>
      <div class="add-row">
        <button class="add-btn" data-add="titel">+ Titel</button>
        <button class="add-btn" data-add="tekst">+ Tekst</button>
        <button class="add-btn" data-add="billede">+ Billede</button>
        <button class="add-btn" data-add="video">+ Video</button>
      </div>

      <div id="propsPanel" style="display:none; margin-bottom:20px; padding:12px; background:#f7f7fb; border-radius:8px;">
        <h2 style="margin-top:0;">Egenskaber</h2>
        <div id="propsFontSizeRow" style="margin-bottom:12px;">
          <label style="margin-top:0;">Skriftstørrelse</label>
          <input type="range" id="propFontSize" min="0.8" max="8" step="0.1" style="width:100%;">
        </div>
        <div id="propsTextColorRow" style="margin-bottom:12px;">
          <label style="margin-top:0;">Tekstfarve</label>
          <div style="display:flex; align-items:center; gap:8px;">
            <input type="color" id="propTextColor" style="width:40px; height:32px; border:none; border-radius:6px; cursor:pointer; padding:0;">
            <input type="text" id="propTextColorHex" placeholder="#rrggbb" style="width:90px; padding:6px 8px; font-size:12px; border:1px solid #ddd; border-radius:6px;">
          </div>
        </div>
        <div style="margin-bottom:12px;">
          <label style="margin-top:0;">Boksens baggrundsfarve</label>
          <div style="display:flex; align-items:center; gap:8px;">
            <input type="color" id="propBoxColor" style="width:40px; height:32px; border:none; border-radius:6px; cursor:pointer; padding:0;">
            <input type="text" id="propBoxColorHex" placeholder="#rrggbb" style="width:90px; padding:6px 8px; font-size:12px; border:1px solid #ddd; border-radius:6px;">
            <button id="propBoxColorClear" style="padding:6px 10px; font-size:12px;">Ryd</button>
          </div>
        </div>
        <div>
          <label style="margin-top:0;">Lag (ræsækkefølge)</label>
          <div style="display:flex; gap:8px;">
            <button id="propMoveBack" style="padding:6px 10px; font-size:12px; flex:1;">◀ Send bagud</button>
            <button id="propMoveFront" style="padding:6px 10px; font-size:12px; flex:1;">Send forrest ▶</button>
          </div>
        </div>
      </div>

      <h2>Baggrund</h2>
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:20px;">
        <input type="color" id="bgColorInput" value="#0a0a0a" style="width:40px; height:32px; border:none; border-radius:6px; cursor:pointer; padding:0;">
        <input type="text" id="bgColorHex" placeholder="#rrggbb" style="width:90px; padding:6px 8px; font-size:12px; border:1px solid #ddd; border-radius:6px;">
      </div>

      <h2>Medie-bibliotek</h2>
      <div class="media-banner" id="mediaBanner">Vælg et medie til elementet nedenfor (eller klik her for at annullere)</div>
      <div class="media-grid" id="mediaGrid"></div>
      <label class="upload-label">
        Upload nyt billede/video
        <input type="file" id="uploadInput" accept="image/*,video/*">
      </label>
    </div>

    <div class="canvas-outer">
      <div class="canvas" id="canvas"></div>
    </div>
  </div>
</div>

<script>
  const SCRIPT_VERSION = '2026-07-16-debug1';
  console.log('[redigering-debug] Script version:', SCRIPT_VERSION);

  const SUPABASE_URL = 'https://irijatnmgvutrqngwpaa.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_taPyJFcINrPL5JiB-ay4CQ_iscnTyy3';
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentButikId = null;
  let currentContentId = null;
  let elements = [];
  let baggrundsfarve = '#0a0a0a';
  let mediaLibrary = [];
  let armedElementId = null;
  let selectedElementId = null;

  const loginWrap = document.getElementById('loginWrap');
  const app = document.getElementById('app');
  const loginMsg = document.getElementById('loginMsg');
  const saveMsg = document.getElementById('saveMsg');
  const canvas = document.getElementById('canvas');
  const mediaGrid = document.getElementById('mediaGrid');
  const mediaBanner = document.getElementById('mediaBanner');

  function showMsg(el, text, ok) {
    el.textContent = text;
    el.style.display = 'block';
    el.className = 'msg ' + (ok ? 'ok' : 'err');
  }

  function uid() {
    return (crypto.randomUUID ? crypto.randomUUID() : 'el-' + Math.random().toString(36).slice(2));
  }

  const EMOJI_LIST = ['😀','😍','🔥','🎉','⭐','✨','❤️','👍','🛍️','🏷️','💰','🎁','📢','⏰','✅','❌','🆕','💯','🥳','😎','🍀','🌟','🎈','👑'];
  let openEmojiPicker = null;

  function buildFormatButton(label, extraStyle, onClick, textDiv) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = label;
    btn.className = 'fmt-btn';
    btn.style.cssText = extraStyle;
    btn.addEventListener('mousedown', (e) => e.preventDefault());
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      textDiv.focus();
      onClick();
    });
    return btn;
  }

  function buildEmojiButton(textDiv, el) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = '🙂';
    btn.className = 'fmt-btn';
    btn.addEventListener('mousedown', (e) => e.preventDefault());
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleEmojiPicker(btn, textDiv, el);
    });
    return btn;
  }

  function toggleEmojiPicker(anchorBtn, textDiv, el) {
    if (openEmojiPicker) { openEmojiPicker.remove(); openEmojiPicker = null; return; }
    const picker = document.createElement('div');
    picker.className = 'emoji-picker';
    EMOJI_LIST.forEach(em => {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = em;
      b.addEventListener('mousedown', (e) => e.preventDefault());
      b.addEventListener('click', (e) => {
        e.stopPropagation();
        textDiv.focus();
        document.execCommand('insertText', false, em);
        el.html = textDiv.innerHTML;
        picker.remove();
        openEmojiPicker = null;
      });
      picker.appendChild(b);
    });
    document.body.appendChild(picker);
    const rect = anchorBtn.getBoundingClientRect();
    picker.style.top = (rect.bottom + window.scrollY + 4) + 'px';
    picker.style.left = (rect.left + window.scrollX) + 'px';
    openEmojiPicker = picker;

    setTimeout(() => {
      document.addEventListener('click', function closeOnce(ev) {
        if (!picker.contains(ev.target)) {
          picker.remove();
          if (openEmojiPicker === picker) openEmojiPicker = null;
          document.removeEventListener('click', closeOnce);
        }
      });
    }, 0);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function isYoutubeUrl(url) {
    return /youtube\.com|youtu\.be/.test(url);
  }

  function youtubeEmbedUrl(url) {
    const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (!m) return url;
    const id = m[1];
    return 'https://www.youtube.com/embed/' + id + '?autoplay=1&mute=1&loop=1&controls=0&playlist=' + id;
  }

  // ---------- Login / bootstrap ----------

  async function loadEverything() {
    const { data: { user } } = await client.auth.getUser();
    if (!user) return;

    const { data: brugerRow, error: brugerErr } = await client
      .from('brugere')
      .select('butik_id, butikker(navn)')
      .eq('id', user.id)
      .single();

    if (brugerErr || !brugerRow) {
      showMsg(loginMsg, 'Din bruger er ikke koblet til en butik endnu. Kontakt admin.', false);
      return;
    }

    currentButikId = brugerRow.butik_id;
    document.getElementById('butikNavn').textContent = brugerRow.butikker.navn;

    const { data: contentRow } = await client
      .from('content')
      .select('*')
      .eq('butik_id', currentButikId)
      .order('opdateret_at', { ascending: false })
      .limit(1)
      .maybeSingle();

    console.log('[redigering-debug] Hentet content-raekke:', contentRow && contentRow.id, 'opdateret_at:', contentRow && contentRow.opdateret_at);

    if (contentRow) {
      currentContentId = contentRow.id;
      if (contentRow.layout && Array.isArray(contentRow.layout.elements) && contentRow.layout.elements.length) {
        elements = contentRow.layout.elements;
        baggrundsfarve = contentRow.layout.background || '#0a0a0a';
      } else {
        // Migrer gammelt simpelt indhold ind som startpunkt i canvas
        elements = [];
        if (contentRow.titel) elements.push({ id: uid(), type: 'titel', text: contentRow.titel, x: 5, y: 8, w: 55, h: 20 });
        if (contentRow.tekst) elements.push({ id: uid(), type: 'tekst', text: contentRow.tekst, x: 5, y: 32, w: 50, h: 20 });
        if (contentRow.billede_url) elements.push({ id: uid(), type: 'billede', url: contentRow.billede_url, x: 60, y: 8, w: 35, h: 50 });
      }
    }

    document.getElementById('bgColorInput').value = baggrundsfarve;
    document.getElementById('bgColorHex').value = baggrundsfarve;
    canvas.style.background = baggrundsfarve;
    await loadMedia();
    renderCanvas();

    loginWrap.style.display = 'none';
    app.style.display = 'block';
  }

  function normalizeHex(v) {
    v = v.trim();
    if (!v.startsWith('#')) v = '#' + v;
    if (/^#([0-9a-fA-F]{3})$/.test(v)) {
      v = '#' + v.slice(1).split('').map(c => c + c).join('');
    }
    return /^#[0-9a-fA-F]{6}$/.test(v) ? v.toLowerCase() : null;
  }

  function wireColorHex(colorInput, hexInput, onChange) {
    hexInput.value = colorInput.value;
    colorInput.addEventListener('input', () => {
      hexInput.value = colorInput.value;
      onChange(colorInput.value);
    });
    hexInput.addEventListener('input', () => {
      const normalized = normalizeHex(hexInput.value);
      if (!normalized) return;
      colorInput.value = normalized;
      onChange(normalized);
    });
  }

  function updateBgColor(val) {
    baggrundsfarve = val;
    canvas.style.background = val;
  }
  wireColorHex(document.getElementById('bgColorInput'), document.getElementById('bgColorHex'), updateBgColor);

  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) {
      showMsg(loginMsg, 'Udfyld både email og adgangskode.', false);
      return;
    }
    const { error } = await client.auth.signInWithPassword({ email, password });
    if (error) {
      showMsg(loginMsg, 'Forkert email eller adgangskode.', false);
      return;
    }
    await loadEverything();
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await client.auth.signOut();
    app.style.display = 'none';
    loginWrap.style.display = 'flex';
    loginMsg.className = 'msg';
    loginMsg.style.display = 'none';
  });

  client.auth.getSession().then(({ data: { session } }) => {
    if (session) loadEverything();
  });

  // ---------- Media library ----------

  async function loadMedia() {
    const { data, error } = await client
      .from('media')
      .select('*')
      .eq('butik_id', currentButikId)
      .order('oprettet_at', { ascending: false });
    if (!error && data) mediaLibrary = data;
    renderMediaGrid();
  }

  function renderMediaGrid() {
    mediaGrid.innerHTML = '';
    const armedEl = elements.find(e => e.id === armedElementId);
    const filtered = armedEl ? mediaLibrary.filter(m => m.type === armedEl.type) : mediaLibrary;

    filtered.forEach(m => {
      const item = document.createElement('div');
      item.className = 'media-item' + (armedEl ? ' selectable' : '');
      item.innerHTML = m.type === 'billede'
        ? '<img src="' + m.url + '">'
        : '<video src="' + m.url + '" muted></video>';
      const fname = document.createElement('div');
      fname.className = 'fname';
      fname.textContent = m.filnavn || '';
      item.appendChild(fname);
      item.addEventListener('click', () => {
        if (!armedEl) return;
        armedEl.url = m.url;
        armedElementId = null;
        mediaBanner.classList.remove('active');
        renderCanvas();
        renderMediaGrid();
      });
      mediaGrid.appendChild(item);
    });
  }

  mediaBanner.addEventListener('click', () => {
    armedElementId = null;
    mediaBanner.classList.remove('active');
    renderCanvas();
    renderMediaGrid();
  });

  async function uploadFile(file, targetElementId) {
    const type = file.type.startsWith('video') ? 'video' : 'billede';
    const path = currentButikId + '/' + uid() + '-' + file.name;

    const { error: uploadErr } = await client.storage.from('media').upload(path, file);
    if (uploadErr) {
      alert('Upload fejlede: ' + uploadErr.message);
      return;
    }
    const { data: pub } = client.storage.from('media').getPublicUrl(path);

    const { data: mediaRow, error: insertErr } = await client
      .from('media')
      .insert({ butik_id: currentButikId, type, url: pub.publicUrl, filnavn: file.name })
      .select()
      .single();

    if (insertErr) {
      alert('Kunne ikke gemme media i biblioteket: ' + insertErr.message);
      return;
    }

    mediaLibrary.unshift(mediaRow);

    if (targetElementId) {
      const el = elements.find(e => e.id === targetElementId);
      if (el) el.url = mediaRow.url;
      renderCanvas();
    }
    renderMediaGrid();
  }

  document.getElementById('uploadInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (file) await uploadFile(file, armedElementId);
    e.target.value = '';
  });

  // ---------- Canvas / elements ----------

  document.querySelectorAll('[data-add]').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.getAttribute('data-add');
      const defaults = {
        titel:   { x: 5,  y: 5,  w: 55, h: 20, text: 'Ny titel' },
        tekst:   { x: 5,  y: 28, w: 50, h: 20, text: 'Ny tekst' },
        billede: { x: 55, y: 5,  w: 40, h: 45, url: null },
        video:   { x: 5,  y: 50, w: 90, h: 40, url: null },
      }[type];
      elements.push(Object.assign({ id: uid(), type }, defaults));
      renderCanvas();
    });
  });

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

  function renderCanvas() {
    canvas.innerHTML = '';
    elements.forEach(el => canvas.appendChild(buildElementNode(el)));
  }

  canvas.addEventListener('click', (e) => {
    if (e.target === canvas && selectedElementId) {
      const prev = canvas.querySelector('.el.selected');
      if (prev) prev.classList.remove('selected');
      selectedElementId = null;
      renderPropsPanel();
    }
  });

  function buildElementNode(el) {
    const node = document.createElement('div');
    node.className = 'el';
    node.dataset.type = el.type;
    node.dataset.elId = el.id;
    node.style.left = el.x + '%';
    node.style.top = el.y + '%';
    node.style.width = el.w + '%';
    node.style.height = el.h + '%';
    if (el.boxColor) node.style.background = el.boxColor;
    node.addEventListener('click', () => selectElement(el.id));

    const body = document.createElement('div');
    body.className = 'el-body';
    let textDiv = null;

    if (el.type === 'titel' || el.type === 'tekst') {
      textDiv = document.createElement('div');
      textDiv.className = 'el-text';
      textDiv.contentEditable = 'true';
      textDiv.innerHTML = el.html != null ? el.html : escapeHtml(el.text || '');
      if (el.fontSize) textDiv.style.fontSize = el.fontSize + 'vw';
      if (el.textColor) textDiv.style.color = el.textColor;
      textDiv.addEventListener('input', () => { el.html = textDiv.innerHTML; });
      body.appendChild(textDiv);
    } else {
      // billede eller video
      if (el.url) {
        let media;
        if (el.type === 'video' && el.kind === 'youtube') {
          media = document.createElement('iframe');
          media.src = youtubeEmbedUrl(el.url);
          media.setAttribute('frameborder', '0');
          media.setAttribute('allow', 'autoplay; encrypted-media');
        } else if (el.type === 'billede') {
          media = Object.assign(document.createElement('img'), { src: el.url });
        } else {
          media = Object.assign(document.createElement('video'), { src: el.url, muted: true, loop: true, autoplay: true, playsInline: true });
        }
        media.className = 'el-media-fill';
        body.appendChild(media);

        const change = document.createElement('div');
        change.className = 'el-change-btn';
        change.textContent = 'Skift';
        change.addEventListener('click', () => {
          el.url = null;
          delete el.kind;
          renderCanvas();
        });
        body.appendChild(change);
      } else {
        const placeholder = document.createElement('div');
        placeholder.className = 'el-placeholder';

        const libBtn = document.createElement('button');
        libBtn.textContent = 'Vælg fra bibliotek';
        libBtn.addEventListener('click', () => armForSelection(el));
        placeholder.appendChild(libBtn);

        const uploadLabel = document.createElement('label');
        uploadLabel.textContent = 'Upload nyt';
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = el.type === 'video' ? 'video/*' : 'image/*';
        fileInput.addEventListener('change', async (e) => {
          const file = e.target.files[0];
          if (file) await uploadFile(file, el.id);
        });
        uploadLabel.appendChild(fileInput);
        placeholder.appendChild(uploadLabel);

        const linkWrap = document.createElement('div');
        linkWrap.style.cssText = 'display:flex; gap:4px; margin-top:6px;';
        const linkInput = document.createElement('input');
        linkInput.type = 'text';
        linkInput.placeholder = el.type === 'video' ? 'Link (YouTube/mp4)' : 'Link til billede';
        linkInput.style.cssText = 'font-size:10px; padding:4px 6px; border-radius:5px; border:1px solid #444; background:#111; color:#eee; width:110px;';
        const linkBtn = document.createElement('button');
        linkBtn.textContent = 'OK';
        linkBtn.style.padding = '4px 8px';
        linkBtn.addEventListener('click', () => {
          const val = linkInput.value.trim();
          if (!val) return;
          el.url = val;
          if (el.type === 'video') el.kind = isYoutubeUrl(val) ? 'youtube' : 'direct';
          renderCanvas();
        });
        linkWrap.appendChild(linkInput);
        linkWrap.appendChild(linkBtn);
        placeholder.appendChild(linkWrap);

        body.appendChild(placeholder);
      }
    }

    const header = document.createElement('div');
    header.className = 'el-header';
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = el.type;
    header.appendChild(tag);

    if (textDiv) {
      const fmtGroup = document.createElement('span');
      fmtGroup.className = 'fmt-group';
      fmtGroup.appendChild(buildFormatButton('B', 'font-weight:700;', () => {
        document.execCommand('bold');
        el.html = textDiv.innerHTML;
      }, textDiv));
      fmtGroup.appendChild(buildFormatButton('•', '', () => {
        document.execCommand('insertUnorderedList');
        el.html = textDiv.innerHTML;
      }, textDiv));
      fmtGroup.appendChild(buildEmojiButton(textDiv, el));
      header.appendChild(fmtGroup);
    }

    const del = document.createElement('span');
    del.className = 'del';
    del.textContent = '✕';
    del.addEventListener('click', (e) => {
      e.stopPropagation();
      elements = elements.filter(x => x.id !== el.id);
      if (armedElementId === el.id) { armedElementId = null; mediaBanner.classList.remove('active'); renderMediaGrid(); }
      if (selectedElementId === el.id) { selectedElementId = null; renderPropsPanel(); }
      renderCanvas();
    });
    header.appendChild(del);
    header.addEventListener('pointerdown', (e) => {
      if (e.target === header || e.target === tag) startDrag(e, el, node);
    });
    node.appendChild(header);
    node.appendChild(body);

    const resizeHandle = document.createElement('div');
    resizeHandle.className = 'resize-handle';
    resizeHandle.addEventListener('pointerdown', (e) => startResize(e, el, node));
    node.appendChild(resizeHandle);

    if (el.id === armedElementId) node.classList.add('selectable-target');
    if (el.id === selectedElementId) node.classList.add('selected');

    return node;
  }

  function armForSelection(el) {
    armedElementId = el.id;
    mediaBanner.classList.add('active');
    renderCanvas();
    renderMediaGrid();
  }

  function selectElement(id) {
    if (selectedElementId === id) return;
    const prev = canvas.querySelector('.el.selected');
    if (prev) prev.classList.remove('selected');
    selectedElementId = id;
    const next = canvas.querySelector('[data-el-id="' + id + '"]');
    if (next) next.classList.add('selected');
    renderPropsPanel();
  }

  function defaultFontSize(type) {
    return type === 'titel' ? 2.6 : 1.4;
  }
  function defaultTextColor(type) {
    return type === 'titel' ? '#ffffff' : '#d0d0d0';
  }

  function renderPropsPanel() {
    const el = elements.find(e => e.id === selectedElementId);
    const panel = document.getElementById('propsPanel');
    if (!el) {
      panel.style.display = 'none';
      return;
    }
    panel.style.display = 'block';
    const isText = el.type === 'titel' || el.type === 'tekst';
    document.getElementById('propsFontSizeRow').style.display = isText ? 'block' : 'none';
    document.getElementById('propsTextColorRow').style.display = isText ? 'block' : 'none';
    document.getElementById('propFontSize').value = el.fontSize || defaultFontSize(el.type);
    const textColorVal = el.textColor || defaultTextColor(el.type);
    document.getElementById('propTextColor').value = textColorVal;
    document.getElementById('propTextColorHex').value = textColorVal;
    const boxColorVal = el.boxColor || '#000000';
    document.getElementById('propBoxColor').value = boxColorVal;
    document.getElementById('propBoxColorHex').value = boxColorVal;
  }

  document.getElementById('propFontSize').addEventListener('input', (e) => {
    const el = elements.find(x => x.id === selectedElementId);
    if (!el) return;
    el.fontSize = parseFloat(e.target.value);
    renderCanvas();
  });
  document.getElementById('propTextColor').addEventListener('input', (e) => {
    const el = elements.find(x => x.id === selectedElementId);
    if (!el) return;
    el.textColor = e.target.value;
    renderCanvas();
  });
  document.getElementById('propBoxColor').addEventListener('input', (e) => {
    const el = elements.find(x => x.id === selectedElementId);
    if (!el) return;
    el.boxColor = e.target.value;
    renderCanvas();
  });
  document.getElementById('propBoxColorClear').addEventListener('click', () => {
    const el = elements.find(x => x.id === selectedElementId);
    if (!el) return;
    delete el.boxColor;
    renderCanvas();
  });

  function moveElement(id, direction) {
    const idx = elements.findIndex(e => e.id === id);
    if (idx === -1) return;
    const newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= elements.length) return;
    const [item] = elements.splice(idx, 1);
    elements.splice(newIdx, 0, item);
    renderCanvas();
  }
  document.getElementById('propMoveBack').addEventListener('click', () => {
    if (selectedElementId) moveElement(selectedElementId, -1);
  });
  document.getElementById('propMoveFront').addEventListener('click', () => {
    if (selectedElementId) moveElement(selectedElementId, 1);
  });

  function startDrag(e, el, node) {
    e.preventDefault();
    e.stopPropagation();
    const rect = canvas.getBoundingClientRect();
    const startX = e.clientX, startY = e.clientY;
    const startLeft = el.x, startTop = el.y;

    function onMove(ev) {
      const dx = ((ev.clientX - startX) / rect.width) * 100;
      const dy = ((ev.clientY - startY) / rect.height) * 100;
      el.x = clamp(startLeft + dx, 0, 100 - el.w);
      el.y = clamp(startTop + dy, 0, 100 - el.h);
      node.style.left = el.x + '%';
      node.style.top = el.y + '%';
    }
    function onUp() {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
    }
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  }

  function startResize(e, el, node) {
    e.preventDefault();
    e.stopPropagation();
    const rect = canvas.getBoundingClientRect();
    const startX = e.clientX, startY = e.clientY;
    const startW = el.w, startH = el.h;

    function onMove(ev) {
      const dw = ((ev.clientX - startX) / rect.width) * 100;
      const dh = ((ev.clientY - startY) / rect.height) * 100;
      el.w = clamp(startW + dw, 5, 100 - el.x);
      el.h = clamp(startH + dh, 5, 100 - el.y);
      node.style.width = el.w + '%';
      node.style.height = el.h + '%';
    }
    function onUp() {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
    }
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  }

  // ---------- Save ----------

  document.getElementById('saveBtn').addEventListener('click', async () => {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;

    const payload = { layout: { elements, background: baggrundsfarve }, opdateret_at: new Date().toISOString() };
    console.log('[redigering-debug] Gemmer, currentContentId=', currentContentId, 'payload=', payload);
    let error, updatedRows;

    if (currentContentId) {
      const res = await client.from('content').update(payload).eq('id', currentContentId).select();
      error = res.error;
      updatedRows = res.data;
      console.log('[redigering-debug] Update-resultat, raekker ramt:', updatedRows ? updatedRows.length : 0, updatedRows);
    } else {
      const { data, error: insertErr } = await client
        .from('content')
        .insert(Object.assign({ butik_id: currentButikId }, payload))
        .select()
        .single();
      error = insertErr;
      if (data) currentContentId = data.id;
      console.log('[redigering-debug] Insert-resultat:', data);
    }

    btn.disabled = false;
    if (error) {
      showMsg(saveMsg, 'Kunne ikke gemme: ' + error.message, false);
    } else if (currentContentId && (!updatedRows || updatedRows.length === 0)) {
      showMsg(saveMsg, 'ADVARSEL: Gem-kaldet ramte 0 rækker (formentlig en RLS/id-uoverensstemmelse) - intet blev reelt gemt!', false);
    } else {
      showMsg(saveMsg, 'Gemt!', true);
      console.log('[redigering-debug] Gemt OK, opdateret_at:', payload.opdateret_at);
    }
  });
</script>
</body>
</html>
